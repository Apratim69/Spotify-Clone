<!doctype html>
<html lang="en">
  <head>
    <title>Spotify Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
      href="style.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Symbols"
      rel="stylesheet"
    />
  </head>
  <body style="background-color: black">
    <div class="header">
      <div class="logo">
        <img
          class="spotifylogo"
          src="icons/Spotify_Primary_Logo_RGB_White.png"
          width="32px"
          height="32px"
        />
      </div>
      <div class="homebutton">
        <button class="home-btn"></button>
      </div>
      <div class="searchbox">
        <input
          class="search"
          type="search"
          placeholder="What do you want to play?"
        />
      </div>
      <div class="premium">
        <button class="premium-btn">Explore Premium</button>
      </div>
      <div class="install">
        <button class="install-btn">
          <span class="material-symbols"> download_for_offline</span>Install App
        </button>
      </div>
      <div class="bell">
        <button class="bellicon-btn">
          <span class="material-symbols"> notifications </span>
        </button>
      </div>
      <div class="friend">
        <button class="friend-btn">
          <span class="material-symbols"> group </span>
        </button>
      </div>
      <div class="profile">
        <button class="profile-btn">
          <span class="material-symbols"> face </span>
        </button>
      </div>
    </div>

    <div class="main-body">
    <div class="Your-Library">
      <div class="YL-header">
        <p class="p1">Your Library</p>
        <div class="add">
          <button class="add-btn">
            <span class="material-symbols" style="color: rgb(150, 150, 150)">
              add
            </span>
            Create
          </button>
        </div>
        <div class="zoom">
          <button class="zoom-btn">
            <span class="material-symbols"> pan_zoom </span>
          </button>
        </div>
      </div>
      <div class="h2">
        <button class="playlists-btn">Playlists</button>
        <button class="artists-btn">Artists</button>
      </div>
      <div class="h3">
        <button class="search2">
          <span class="material-symbols"> search </span>
        </button>
        <div class="right-h3">
          <p>Recents</p>
          <span class="material-symbols"> list </span>
        </div>
      </div>

      <div class="artist-tab">
        <div class="content">
          <div class="tab">
            <div class="tab-l">
              <img class="tab-img" src="covers/lp.png" width="50px" />
            </div>
            <div class="tab-r">
            
              <p class="tab-name">Linkin Park</p>
              <p class="tab-type">Artist</p>
            </div>
          </div>
        </div>
        <div class="content">
          <div class="tab">
            <div class="tab-l">
              <img class="tab-img" src="covers/weeknd.jpeg" width="50px" />
            </div>
            <div class="tab-r">
              <p class="tab-name">The Weeknd</p>
              <p class="tab-type">Artist</p>
            </div>
          </div>
        </div>
        <div class="content">
          <div class="tab">
            <div class="tab-l">
              <img class="tab-img" src="covers/eminem.jpeg" width="50px" />
            </div>
            <div class="tab-r">
              <p class="tab-name">Eminem</p>
              <p class="tab-type">Artist</p>
            </div>
          </div>
        </div>
        <div class="content">
          <div class="tab">
            <div class="tab-l">
              <img class="tab-img" src="covers/slipknot.jpeg" width="50px" />
            </div>
            <div class="tab-r">
              <p class="tab-name">Slipknot</p>
              <p class="tab-type">Artist</p>
            </div>
          </div>
        </div>
        <div class="content">
          <div class="tab">
            <div class="tab-l">
              <img class="tab-img" src="covers/nirvana.jpeg" width="50px" />
            </div>
            <div class="tab-r">
              <p class="tab-name">Nirvana</p>
              <p class="tab-type">Artist</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="right-tab">
      <div class="r-head">
        <button class="all-btn">All</button>
        <button class="music-btn">Music</button>
        <button class="podcast-btn">Podcasts</button>
      </div>
    </div>
    </div>
  </body>
</html>
