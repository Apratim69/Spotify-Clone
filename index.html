<!doctype html>
<html lang="en">
  <head>
    <title>Spotify Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
      href="style.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=download_for_offline"
    />
  </head>
  <body style="background-color: black">
    <div class="header">
      <div class="logo">
        <img
          class="spotifylogo"
          src="icons/Spotify_Primary_Logo_RGB_White.png"
          width="32px"
          height="32px"
        />
      </div>
      <div class="homebutton">
        <button class="home-btn"></button>
      </div>
      <div class="searchbox">
        <input
          class="search"
          type="search"
          placeholder="What do you want to play?"
        />
      </div>
      <div class="premium">
        <button class="premium-btn">Explore Premium</button>
      </div>
      <div class="install">
        <button class="install-btn">
          <span class="material-symbols-outlined"> download_for_offline </span>
          Install App
        </button>
      </div>
    </div>
  </body>
</html>
